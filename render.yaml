services:
  - type: web
    name: calendar-app
    runtime: docker
    region: Frankfurt
    buildCommand: docker build -t calendar-app .
    startCommand: sh -c "touch /var/www/backend/database/database.sqlite && chmod -R 777 /var/www/storage /var/www/bootstrap/cache /var/www/backend/database && php /var/www/artisan migrate --force && php /var/www/artisan serve --host=0.0.0.0 --port=$PORT"
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8000
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        value: base64:hzwqZlathKykpD8On27uE6QsvdyHpPqrtfPB2+rQ788=
      - key: DB_DATABASE
        value: /var/www/backend/database/database.sqlite
    disks:
      - name: sqlite-data
        mountPath: /var/www/backend/database
        sizeGB: 1