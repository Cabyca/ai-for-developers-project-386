services:
  - type: web
    name: calendar-app
    runtime: docker
    region: Frankfurt
    buildCommand: docker build -t calendar-app .
    startCommand: sh -c "chmod -R 777 storage bootstrap/cache database && php artisan serve --host=0.0.0.0 --port=$PORT"
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8000
      - key: APP_ENV
        value: production
      - key: DB_DATABASE
        value: /app/backend/database/database.sqlite
    disks:
      - name: sqlite-data
        mountPath: /app/backend/database
        sizeGB: 1