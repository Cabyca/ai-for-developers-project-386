services:
  - type: web
    name: calendar-app
    runtime: docker
    region: Frankfurt
    buildCommand: docker build -t calendar-app .
    startCommand: sh -c "mkdir -p /var/www/storage /var/www/bootstrap/cache && chmod -R 777 /var/www/storage /var/www/bootstrap/cache && php /var/www/artisan serve --host=0.0.0.0 --port=$PORT 2>&1"
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8000
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"